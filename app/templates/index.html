<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Poser Mini</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
    .container { max-width: 640px; width: 100%; }
    h1 { font-size: 1.8rem; margin-bottom: 0.25rem; color: #f0f6fc; }
    h1 span { color: #ff6b6b; }
    .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
    label { display: block; font-size: 0.85rem; color: #8b949e; margin-bottom: 0.3rem; margin-top: 1rem; }
    input, textarea { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #30363d; border-radius: 6px; background: #161b22; color: #c9d1d9; font-size: 0.95rem; }
    input:focus, textarea:focus { outline: none; border-color: #58a6ff; }
    textarea { min-height: 100px; resize: vertical; }
    button { margin-top: 1.2rem; width: 100%; padding: 0.7rem; border: none; border-radius: 6px; background: #ff6b6b; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #e05555; }
    button:disabled { background: #484f58; cursor: not-allowed; }

    /* Loading */
    .loader { display: none; text-align: center; margin-top: 2rem; }
    .loader.active { display: block; }
    .spinner { width: 36px; height: 36px; border: 3px solid #30363d; border-top-color: #ff6b6b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 0.8rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    #result { display: none; margin-top: 2rem; }
    #result.active { display: block; }
    .verdict-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 4px; font-weight: 700; font-size: 0.9rem; margin-right: 0.5rem; }
    .verdict-VALIDATED { background: #238636; color: #fff; }
    .verdict-ATTACKED { background: #da3633; color: #fff; }
    .verdict-UNCERTAIN { background: #d29922; color: #fff; }
    .confidence { font-size: 0.8rem; color: #8b949e; }
    .summary { margin-top: 0.8rem; line-height: 1.5; }
    .evidence-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 0.8rem 1rem; margin-top: 0.6rem; }
    .evidence-card .title { font-weight: 600; color: #58a6ff; }
    .evidence-card .title a { color: inherit; text-decoration: none; }
    .evidence-card .title a:hover { text-decoration: underline; }
    .evidence-card .meta { font-size: 0.8rem; color: #8b949e; margin-top: 0.2rem; }
    .evidence-card .note { margin-top: 0.4rem; font-size: 0.9rem; }
    .stance { display: inline-block; font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 3px; font-weight: 600; }
    .stance-SUPPORTS { background: #1a4d2e; color: #3fb950; }
    .stance-CONTRADICTS { background: #4d1a1a; color: #f85149; }
    .stance-CONTEXTUAL { background: #3d2e00; color: #d29922; }

    .share-box { margin-top: 1.2rem; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 0.8rem 1rem; }
    .share-box h3 { font-size: 0.85rem; color: #8b949e; margin-bottom: 0.4rem; }
    .share-text { font-size: 0.9rem; line-height: 1.4; white-space: pre-wrap; }
    .copy-btn { margin-top: 0.5rem; padding: 0.35rem 0.8rem; font-size: 0.8rem; background: #30363d; border: 1px solid #484f58; border-radius: 4px; color: #c9d1d9; cursor: pointer; }
    .copy-btn:hover { background: #484f58; }

    .error-box { margin-top: 2rem; background: #4d1a1a; border: 1px solid #f85149; border-radius: 6px; padding: 1rem; display: none; }
    .error-box.active { display: block; }
    .error-box h3 { color: #f85149; margin-bottom: 0.3rem; }

    .tweet-url-display { font-size: 0.8rem; color: #8b949e; margin-bottom: 0.6rem; word-break: break-all; }
    .claim-display { font-style: italic; color: #c9d1d9; margin-bottom: 0.6rem; padding: 0.5rem 0.8rem; border-left: 3px solid #ff6b6b; }
    h2 { font-size: 1.2rem; margin-bottom: 0.6rem; color: #f0f6fc; }
    h3.section { margin-top: 1rem; font-size: 0.95rem; color: #8b949e; }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>X</span>-Poser Mini</h1>
    <p class="subtitle">Paste a claim. Get receipts.</p>

    <form id="claimForm">
      <label for="tweet_url">Tweet URL (optional)</label>
      <input type="url" id="tweet_url" name="tweet_url" placeholder="https://x.com/...">

      <label for="claim_text">Tweet / Claim Text</label>
      <textarea id="claim_text" name="claim_text" placeholder="Paste the claim you want to check..." required minlength="10"></textarea>

      <button type="submit" id="submitBtn">Check Claim</button>
    </form>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p>Searching sources &amp; analysing claim&hellip;</p>
    </div>

    <div class="error-box" id="errorBox">
      <h3 id="errorTitle">Error</h3>
      <p id="errorDetails"></p>
    </div>

    <div id="result">
      <h2>Report</h2>
      <div class="tweet-url-display" id="tweetUrlDisplay"></div>
      <div class="claim-display" id="claimDisplay"></div>

      <div>
        <span class="verdict-badge" id="verdictBadge"></span>
        <span class="confidence" id="confidenceDisplay"></span>
      </div>

      <p class="summary" id="summaryDisplay"></p>

      <h3 class="section">Evidence</h3>
      <div id="evidenceContainer"></div>

      <div class="share-box">
        <h3>Copy-ready reply</h3>
        <p class="share-text" id="shareText"></p>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('claimForm');
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('errorBox');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const tweetUrl = document.getElementById('tweet_url').value.trim();
      const claimText = document.getElementById('claim_text').value.trim();

      if (claimText.length < 10) { alert('Claim text must be at least 10 characters.'); return; }

      // Reset UI
      resultDiv.classList.remove('active');
      errorBox.classList.remove('active');
      loader.classList.add('active');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tweet_url: tweetUrl || null, claim_text: claimText }),
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById('errorTitle').textContent = data.error || 'Error';
          document.getElementById('errorDetails').textContent = data.details || 'Unknown error';
          errorBox.classList.add('active');
          return;
        }

        // Populate result
        document.getElementById('tweetUrlDisplay').textContent = data.tweet_url ? `Source: ${data.tweet_url}` : '';
        document.getElementById('claimDisplay').textContent = `"${data.claim}"`;

        const badge = document.getElementById('verdictBadge');
        badge.textContent = data.verdict;
        badge.className = `verdict-badge verdict-${data.verdict}`;

        document.getElementById('confidenceDisplay').textContent = `Confidence: ${data.confidence}`;
        document.getElementById('summaryDisplay').textContent = data.summary;

        // Evidence cards
        const container = document.getElementById('evidenceContainer');
        container.innerHTML = '';
        (data.evidence || []).forEach((ev) => {
          const card = document.createElement('div');
          card.className = 'evidence-card';
          card.innerHTML = `
            <div class="title">${ev.url ? `<a href="${ev.url}" target="_blank" rel="noopener">${ev.title || 'Source'}</a>` : (ev.title || 'Source')}</div>
            <div class="meta">${ev.published_date || ''} &middot; <span class="stance stance-${ev.stance}">${ev.stance}</span></div>
            <div class="note">${ev.note}</div>
          `;
          container.appendChild(card);
        });

        document.getElementById('shareText').textContent = data.share_text || '';
        resultDiv.classList.add('active');

      } catch (err) {
        document.getElementById('errorTitle').textContent = 'Network Error';
        document.getElementById('errorDetails').textContent = err.message;
        errorBox.classList.add('active');
      } finally {
        loader.classList.remove('active');
        submitBtn.disabled = false;
      }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const text = document.getElementById('shareText').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    });
  </script>
</body>
</html>
